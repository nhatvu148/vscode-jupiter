name: Publish

# Publishes to the VS Code Marketplace when a v* tag is pushed.
# Requires a repository secret VSCE_PAT (Azure DevOps PAT, Marketplace > Manage,
# scoped to "All accessible organizations").
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: xvfb-run -a yarn test
      - name: Publish to Marketplace
        run: npx @vscode/vsce publish --no-yarn -p "$VSCE_PAT"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
